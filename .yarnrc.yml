# Allow fetching from any git repository (restrict in production if needed)
approvedGitRepositories:
  - "**"

# Specify the location for the Yarn cache
cacheFolder: .yarn/cache

# Set the compression level for cached files (0 = fastest, 9 = smallest size, mixed = smart)
compressionLevel: mixed

# Fail if a cache entry has a different checksum than expected
checksumBehavior: throw

# Use a global cache for dependencies (set to true for shared caching across projects)
enableGlobalCache: false

# Enable or disable the global mirror for dependencies
enableMirror: false

# Allow postinstall scripts to run (required by some native dependencies)
enableScripts: true

# Enforce SSL certificate validation
enableStrictSsl: true

# Disable telemetry to prevent sending anonymous usage data
enableTelemetry: false

# Use traditional node_modules linker
nodeLinker: node-modules

# Use hardlinks between identical files to save disk space
nmMode: hardlinks-local

# Silence noisy peer dependency warnings
logFilters:
  - code: YN0060
    level: discard
  - code: YN0086
    level: discard
